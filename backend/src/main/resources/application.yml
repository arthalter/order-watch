server:
  port: 8080

spring:
  application:
    name: order-watch-backend

management:
  endpoints:
    web:
      exposure:
        include: health,info

# ---- OrderWatch Mini config (see OrderWatch-Mini-PRD.md) ----

milvus:
  host: ${MILVUS_HOST:localhost}
  port: ${MILVUS_PORT:19530}
  collection-name: ${MILVUS_COLLECTION_NAME:order_sop_chunks}
  vector-dimension: ${MILVUS_VECTOR_DIMENSION:1024}
  initialize-on-startup: ${MILVUS_INITIALIZE_ON_STARTUP:true}

rag:
  top-k: ${RAG_TOP_K:3}
  docs-path: ${RAG_DOCS_PATH:./order-docs}
  chunk-max-chars: ${RAG_CHUNK_MAX_CHARS:120}

embedding:
  provider: ${EMBEDDING_PROVIDER:dashscope} # fake | dashscope
  dimension: ${EMBEDDING_DIMENSION:1024}
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:}
    model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v4}
    base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    timeout-ms: ${DASHSCOPE_TIMEOUT_MS:10000}

order:
  mock-enabled: ${ORDER_MOCK_ENABLED:true}
